name: Daily Newsletter

on:
  schedule:
    - cron: '0 11 * * *'  # 11 AM UTC = 6 AM EST
    - cron: '0 19 * * *'  # 7 PM UTC = 2 PM EST
    - cron: '0 1 * * *'   # 1 AM UTC = 8 PM EST
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Start Tor proxy
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq tor > /dev/null
          # Enable control port for circuit rotation (no auth needed in CI)
          echo -e "ControlPort 9051\nCookieAuthentication 0" | sudo tee -a /etc/tor/torrc > /dev/null
          sudo service tor restart
          sleep 8
          # Verify Tor is working
          curl -s --socks5-hostname 127.0.0.1:9050 https://check.torproject.org/api/ip || echo "Tor check failed, continuing anyway"

      - name: Restore site archive
        run: |
          git fetch origin gh-pages --depth=1 || true
          git checkout origin/gh-pages -- site/ 2>/dev/null || echo "No existing site archive"

      - name: Run newsletter
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
        run: python -m src.newsletter 2>&1 | tee /tmp/newsletter-build.log

      - name: Validate transcript quality
        run: |
          python3 -c "
          import json, re, sys
          from pathlib import Path
          from datetime import datetime

          today = datetime.now().strftime('%Y-%m-%d')
          archive = Path(f'site/posts/{today}.json')
          if not archive.exists():
              print('WARNING: No archive JSON for today')
              sys.exit(0)

          data = json.loads(archive.read_text())
          videos = data.get('youtube', data.get('podcasts', []))
          if not videos:
              print('WARNING: No youtube/podcast entries in archive')
              sys.exit(0)

          total = len(videos)
          title_only = 0
          good = 0
          emoji_re = re.compile(r'[\U0001F300-\U0001FAFF\U00002600-\U000027BF\U00002702-\U000027B0]')

          for v in videos:
              summary = v.get('summary', '')
              emojis = len(emoji_re.findall(summary))
              bullets = len(summary.split('<br>'))
              if emojis >= 2 and bullets >= 2:
                  good += 1
              else:
                  title_only += 1
                  print(f'  TITLE-ONLY: {v.get(\"title\", \"?\")[:60]}')

          print(f'Transcript quality: {good}/{total} videos have real summaries, {title_only} title-only')
          if title_only > total // 2:
              print(f'WARNING: More than half ({title_only}/{total}) fell back to title-only summaries')
          "

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commit site to gh-pages branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f site/
          git stash
          git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages
          git rm -rf . 2>/dev/null || true
          git stash pop 2>/dev/null || true
          git checkout stash -- site/ 2>/dev/null || git checkout main -- site/ 2>/dev/null || true
          cp -r site/* . 2>/dev/null || true
          git add -A
          git commit -m "Update newsletter site $(date +%Y-%m-%d)" || echo "No changes"
          git push origin gh-pages --force
